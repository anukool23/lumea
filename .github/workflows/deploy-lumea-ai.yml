name: Deploy — lumea-ai

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'main'
        type: string

env:
  AWS_REGION:    ${{ secrets.AWS_REGION }}
  FUNCTION_NAME: ${{ secrets.AI_LAMBDA_FUNCTION_NAME }}

jobs:
  deploy:
    name: Build & Deploy to AWS Lambda
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: lumea-ai/requirements.txt

      # ── Bundle: install deps into dist/, add main.py, zip ─────────────────
      - name: Build deployment package
        working-directory: lumea-ai
        run: |
          pip install -r requirements.txt -t dist/ --quiet
          cp main.py dist/
          cd dist && zip -r ../deployment.zip . -x "*.pyc" -x "__pycache__/*"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Update function code
        working-directory: lumea-ai
        run: |
          aws lambda update-function-code \
            --function-name "$FUNCTION_NAME" \
            --zip-file fileb://deployment.zip \
            --no-cli-pager

      - name: Wait for update to complete
        run: |
          aws lambda wait function-updated \
            --function-name "$FUNCTION_NAME" \
            --no-cli-pager

      - name: Deployment summary
        run: |
          VERSION=$(aws lambda get-function-configuration \
            --function-name "$FUNCTION_NAME" \
            --query 'Version' --output text --no-cli-pager)
          MODIFIED=$(aws lambda get-function-configuration \
            --function-name "$FUNCTION_NAME" \
            --query 'LastModified' --output text --no-cli-pager)
          echo "✅ lumea-ai deployed"
          echo "   Branch   : ${{ inputs.branch }}"
          echo "   Version  : $VERSION"
          echo "   Modified : $MODIFIED"
