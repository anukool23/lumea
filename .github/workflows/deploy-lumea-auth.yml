name: Deploy — lumea-auth

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'main'
        type: string

env:
  AWS_REGION:        ${{ secrets.AWS_REGION }}
  FUNCTION_NAME:     ${{ secrets.AUTH_LAMBDA_FUNCTION_NAME }}
  GO_VERSION:        '1.22'

jobs:
  deploy:
    name: Build & Deploy to AWS Lambda
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout selected branch ──────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      # ── 2. Set up Go ──────────────────────────────────────────────────────────
      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: lumea-auth/go.sum

      # ── 3. Generate Swagger docs ──────────────────────────────────────────────
      - name: Generate Swagger docs
        working-directory: lumea-auth
        run: |
          go install github.com/swaggo/swag/cmd/swag@latest
          swag init --generalInfo main.go --output docs

      # ── 4. Build for Lambda (linux/arm64, static binary named "bootstrap") ───
      - name: Build
        working-directory: lumea-auth
        run: |
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w" -o bootstrap .
          zip -j deployment.zip bootstrap

      # ── 5. Configure AWS credentials ─────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # ── 6. Upload new code to Lambda ──────────────────────────────────────────
      - name: Update function code
        working-directory: lumea-auth
        run: |
          aws lambda update-function-code \
            --function-name "$FUNCTION_NAME" \
            --zip-file fileb://deployment.zip \
            --no-cli-pager

      # ── 7. Wait until Lambda finishes updating ────────────────────────────────
      - name: Wait for update to complete
        run: |
          aws lambda wait function-updated \
            --function-name "$FUNCTION_NAME" \
            --no-cli-pager

      # ── 8. Print deployed version info ────────────────────────────────────────
      - name: Deployment summary
        run: |
          VERSION=$(aws lambda get-function-configuration \
            --function-name "$FUNCTION_NAME" \
            --query 'Version' --output text --no-cli-pager)
          MODIFIED=$(aws lambda get-function-configuration \
            --function-name "$FUNCTION_NAME" \
            --query 'LastModified' --output text --no-cli-pager)
          echo "✅ lumea-auth deployed"
          echo "   Branch   : ${{ inputs.branch }}"
          echo "   Version  : $VERSION"
          echo "   Modified : $MODIFIED"
